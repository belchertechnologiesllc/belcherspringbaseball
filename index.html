<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --dawson:  #2563EB;
    --cameron: #059669;
    --preston: #DC2626;
    --parker:  #D97706;
    --bg: #F9F7F4;
    --surface: #FFFFFF;
    --border: #E5E2DC;
    --text: #1A1916;
    --muted: #6B6860;
    --subtle: #9A9890;
    --radius: 8px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* ── Header ── */
  .page-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 28px 16px;
  }
  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .page-title {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text);
    line-height: 1.2;
  }
  .page-subtitle {
    font-size: 12px;
    color: var(--subtle);
    font-family: 'DM Mono', monospace;
    margin-top: 2px;
  }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .leg {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
  }
  .leg-swatch {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .leg-name { font-weight: 500; color: var(--text); }

  /* ── Calendar nav ── */
  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 20;
  }
  .month-label {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .nav-btns { display: flex; gap: 6px; }
  .nav-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 32px; height: 32px;
    cursor: pointer;
    font-size: 16px;
    color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s;
  }
  .nav-btn:hover { background: var(--bg); }
  .game-count {
    font-size: 12px;
    color: var(--subtle);
    font-family: 'DM Mono', monospace;
  }

  /* ── Calendar grid ── */
  .cal-wrap { padding: 0 28px 28px; }
  .week-header {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    border-left: 1px solid var(--border);
    border-top: 1px solid var(--border);
    margin-top: 16px;
  }
  .wh-cell {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 6px 0;
    text-align: center;
    font-size: 11px;
    font-weight: 500;
    color: var(--subtle);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: var(--surface);
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    border-left: 1px solid var(--border);
    border-top: 1px solid var(--border);
  }
  .day-cell {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    min-height: 100px;
    padding: 6px 5px 5px;
    background: var(--surface);
    vertical-align: top;
    cursor: default;
  }
  .day-cell.other-month { background: #F4F2EE; }
  .day-cell.today { background: #EFF6FF; }
  .day-num {
    font-size: 11px;
    font-weight: 500;
    color: var(--subtle);
    margin-bottom: 4px;
    display: block;
  }
  .day-cell.today .day-num {
    color: #2563EB;
    font-weight: 600;
  }
  .day-cell.other-month .day-num { color: #C4C0B8; }

  /* ── Event pills ── */
  .pill {
    display: block;
    font-size: 10px;
    font-weight: 500;
    border-radius: 4px;
    padding: 2px 5px;
    margin-bottom: 2px;
    cursor: pointer;
    line-height: 1.4;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    transition: opacity 0.1s, transform 0.1s;
    border: none;
    text-align: left;
    width: 100%;
  }
  .pill:hover { opacity: 0.75; transform: scale(0.98); }
  .pill-dawson  { background: #DBEAFE; color: #1D4ED8; }
  .pill-cameron { background: #D1FAE5; color: #047857; }
  .pill-preston { background: #FEE2E2; color: #B91C1C; }
  .pill-parker  { background: #FEF3C7; color: #B45309; }

  /* ── Busy badge ── */
  .busy-badge {
    display: inline-block;
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    background: #F3F0EA;
    color: var(--subtle);
    border-radius: 3px;
    padding: 1px 4px;
    margin-bottom: 3px;
  }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 0;
    width: 100%;
    max-width: 420px;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }
  .modal-header {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0;
    background: var(--surface);
    border-radius: 12px 12px 0 0;
  }
  .modal-date {
    font-size: 15px;
    font-weight: 600;
  }
  .modal-close {
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 20px;
    color: var(--subtle);
    line-height: 1;
    padding: 0 2px;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 4px 0 8px; }
  .modal-event {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
  }
  .modal-event:last-child { border-bottom: none; }
  .modal-kid-label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .modal-opp {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 3px;
  }
  .modal-meta {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    font-family: 'DM Mono', monospace;
  }
  .modal-note {
    display: inline-block;
    margin-top: 4px;
    font-size: 11px;
    font-style: italic;
    color: var(--subtle);
    font-family: 'DM Sans', sans-serif;
  }
  .ha-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 600;
    border-radius: 3px;
    padding: 1px 5px;
    margin-left: 4px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .ha-home { background: #D1FAE5; color: #047857; }
  .ha-away { background: #FEE2E2; color: #B91C1C; }

  /* ── Summary bar ── */
  .summary-bar {
    display: flex;
    gap: 16px;
    padding: 12px 28px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .sum-card {
    text-align: center;
    flex: 1;
    min-width: 80px;
  }
  .sum-num { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
  .sum-label { font-size: 10px; color: var(--subtle); text-transform: uppercase; letter-spacing: 0.4px; margin-top: 1px; }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .page-header, .cal-nav, .cal-wrap, .summary-bar { padding-left: 12px; padding-right: 12px; }
    .day-cell { min-height: 70px; }
    .page-title { font-size: 16px; }
  }
</style>
</head>

const TODAY = '2026-04-17';
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

let curYear = 2026, curMonth = 3; // April

function pad(n){ return String(n).padStart(2,'0'); }
function dateKey(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }
function daysInMonth(y,m){ return new Date(y, m+1, 0).getDate(); }
function firstDow(y,m){ return new Date(y, m, 1).getDay(); }

function eventsOn(dk){ return EVENTS.filter(e => e.date === dk); }

function timeSort(a,b){
  const parse = t => {
    const [hm, ap] = t.split(' ');
    let [h,min] = hm.split(':').map(Number);
    if(ap==='PM' && h!==12) h+=12;
    if(ap==='AM' && h===12) h=0;
    return h*60+min;
  };
  return parse(a.time) - parse(b.time);
}

function render() {
  document.getElementById('month-label').textContent = MONTHS[curMonth] + ' ' + curYear;

  const grid = document.getElementById('cal-grid');
  const wh = document.getElementById('week-header');
  grid.innerHTML = '';
  wh.innerHTML = '';

  DAYS_SHORT.forEach(d => {
    const c = document.createElement('div');
    c.className = 'wh-cell';
    c.textContent = d;
    wh.appendChild(c);
  });

  const first = firstDow(curYear, curMonth);
  const days = daysInMonth(curYear, curMonth);
  const prevDays = daysInMonth(curYear, curMonth === 0 ? 11 : curMonth-1);
  const total = Math.ceil((first + days) / 7) * 7;

  // count games this month for nav bar
  let monthGames = 0;

  for(let i = 0; i < total; i++){
    let y = curYear, m = curMonth, d;
    let otherMonth = false;
    if(i < first){
      m = curMonth === 0 ? 11 : curMonth-1;
      y = curMonth === 0 ? curYear-1 : curYear;
      d = prevDays - first + i + 1;
      otherMonth = true;
    } else if(i >= first + days){
      m = curMonth === 11 ? 0 : curMonth+1;
      y = curMonth === 11 ? curYear+1 : curYear;
      d = i - first - days + 1;
      otherMonth = true;
    } else {
      d = i - first + 1;
    }

    const dk = dateKey(y, m, d);
    const evs = eventsOn(dk).sort(timeSort);
    if(!otherMonth) monthGames += evs.length;

    const cell = document.createElement('div');
    cell.className = 'day-cell' + (otherMonth ? ' other-month' : '') + (dk === TODAY ? ' today' : '');

    const numEl = document.createElement('span');
    numEl.className = 'day-num';
    numEl.textContent = d;
    cell.appendChild(numEl);

    if(evs.length >= 3 && !otherMonth){
      const badge = document.createElement('span');
      badge.className = 'busy-badge';
      badge.textContent = evs.length + ' games';
      cell.appendChild(badge);
    }

    evs.forEach(ev => {
      const pill = document.createElement('button');
      pill.className = 'pill ' + TEAMS[ev.kid].cls;
      pill.textContent = TEAMS[ev.kid].label + ' ' + ev.time;
      pill.title = TEAMS[ev.kid].label + ' vs ' + ev.opp + ' · ' + (ev.home ? 'Home' : 'Away') + ' · ' + ev.field;
      pill.onclick = (e) => { e.stopPropagation(); showModal(dk, eventsOn(dk).sort(timeSort)); };
      cell.appendChild(pill);
    });

    grid.appendChild(cell);
  }

  document.getElementById('game-count').textContent = monthGames + ' game' + (monthGames !== 1 ? 's' : '') + ' this month';
}

function showModal(dk, evs){
  const d = new Date(dk + 'T12:00:00');
  document.getElementById('modal-date').textContent = d.toLocaleDateString('en-US', {
    weekday:'long', month:'long', day:'numeric', year:'numeric'
  });
  const body = document.getElementById('modal-body');
  body.innerHTML = '';
  evs.forEach(ev => {
    const t = TEAMS[ev.kid];
    const div = document.createElement('div');
    div.className = 'modal-event';
    div.innerHTML = `
      <div class="modal-kid-label" style="color:${t.color}">${t.label} — ${t.team} (${t.age})</div>
      <div class="modal-opp">vs ${ev.opp} <span class="ha-badge ${ev.home ? 'ha-home' : 'ha-away'}">${ev.home ? 'Home' : 'Away'}</span></div>
      <div class="modal-meta">${ev.time} – ${ev.end}<br>${ev.field}</div>
      ${ev.note ? `<div class="modal-note">${ev.note}</div>` : ''}
    `;
    body.appendChild(div);
  });
  document.getElementById('modal-overlay').classList.add('open');
}

document.getElementById('prev').onclick = () => {
  curMonth--; if(curMonth < 0){ curMonth = 11; curYear--; } render();
};
document.getElementById('next').onclick = () => {
  curMonth++; if(curMonth > 11){ curMonth = 0; curYear++; } render();
};
document.getElementById('modal-close').onclick = () => {
  document.getElementById('modal-overlay').classList.remove('open');
};
document.getElementById('modal-overlay').onclick = (e) => {
  if(e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('open');
};

render();
</script>
</body>
</html>

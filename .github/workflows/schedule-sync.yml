name: Check & Deploy Schedule

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if no changes detected'
        required: false
        default: 'false'
        type: boolean

jobs:
  check-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run schedule scraper & builder
        id: build
        env:
          FORCE_REBUILD: ${{ inputs.force_rebuild == 'true' && '1' || '0' }}
        run: |
          node scripts/build.js || true

      - name: Check if output was built
        id: result
        run: |
          if [ -f public/index.html ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "index.html found - will commit and deploy"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          fi

      - name: Commit updated files
        if: steps.result.outputs.changed == 'true'
        run: |
          git config user.name "Schedule Bot"
          git config user.email "bot@belcherfamily.net"
          git add public/index.html schedule-snapshot.json changes.json
          git commit -m "chore: schedule sync $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Log change summary
        if: steps.result.outputs.changed == 'true'
        run: |
          echo "=== Change Summary ==="
          cat changes.json

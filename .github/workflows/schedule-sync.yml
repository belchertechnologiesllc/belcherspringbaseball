name: Check & Deploy Schedule

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if no changes detected'
        required: false
        default: 'false'
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run schedule scraper & builder
        id: build
        env:
          FORCE_REBUILD: ${{ inputs.force_rebuild == 'true' && '1' || '0' }}
        run: |
          set +e
          node scripts/build.js
          CODE=$?
          set -e
          echo "exit_code=$CODE" >> $GITHUB_OUTPUT
          echo "Build exited with code $CODE"
          if [ "$CODE" = "2" ]; then
            echo "Network or parse error - aborting"
            exit 1
          fi

      - name: Commit and push if changed
        if: steps.build.outputs.exit_code == '1'
        run: |
          git config user.name "Schedule Bot"
          git config user.email "bot@belcherfamily.net"
          git add -A public/index.html schedule-snapshot.json changes.json
          git commit -m "chore: schedule sync $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: No changes detected
        if: steps.build.outputs.exit_code == '0'
        run: echo "No schedule changes - skipping deploy"

      - name: Show change summary
        if: steps.build.outputs.exit_code == '1'
        run: cat changes.json

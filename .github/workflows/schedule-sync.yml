name: Check & Deploy Schedule

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if no changes detected'
        required: false
        default: 'false'
        type: boolean

jobs:
  check-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run schedule scraper & builder
        id: build
        env:
          FORCE_REBUILD: ${{ inputs.force_rebuild == 'true' && '1' || '0' }}
        run: |
          node scripts/build.js; CODE=$?
          echo "exit_code=$CODE" >> $GITHUB_OUTPUT
          if [ "$CODE" = "2" ]; then
            echo "Network/parse error - aborting"
            exit 1
          fi
          echo "Build finished with code $CODE"

      - name: Commit and deploy if changed
        if: steps.build.outputs.exit_code == '1'
        run: |
          echo "Changes detected - committing and deploying"
          git config user.name "Schedule Bot"
          git config user.email "bot@belcherfamily.net"
          git add public/index.html schedule-snapshot.json changes.json
          git commit -m "chore: schedule sync $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
          echo "Pushed - Netlify will redeploy automatically"

      - name: No changes
        if: steps.build.outputs.exit_code == '0'
        run: echo "No schedule changes detected - skipping deploy"

      - name: Log change summary
        if: steps.build.outputs.exit_code == '1'
        run: |
          echo "=== Change Summary ==="
          cat changes.json | python3 -m json.tool
